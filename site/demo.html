<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>omnilimb-face · Demo</title>
<style>
  :root{ --bg:#0e1018; --card:#1b2030; --line:#2a3447; --tx:#f4f6fb; --mut:#9aa6bd; --pink:#ff66a5; --blue:#7aa2ff; }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(1200px 600px at 50% -10%,#1b2030,#0e1018);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
  a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
  .top{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--line)}
  .brand{font-weight:700}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  canvas#avatar{width:min(86vw,460px);height:min(86vw,460px);max-height:60vh}
  #subtitle{min-height:1.6em;margin-top:10px;font-size:18px;text-align:center;max-width:600px;color:var(--tx)}
  #emo{color:var(--mut);font-size:13px;margin-top:4px}
  .controls{display:flex;gap:8px;padding:14px 18px 22px;width:100%;max-width:620px;margin:0 auto}
  .controls input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--tx);padding:10px 12px;font-size:15px}
  .controls button{background:linear-gradient(90deg,var(--pink),var(--blue));border:none;border-radius:10px;color:#0e1018;font-weight:700;padding:0 18px;cursor:pointer}
  .hint{color:var(--mut);font-size:12.5px;text-align:center;padding:0 18px 18px}
</style>
</head>
<body>
  <div class="top">
    <div class="brand">🎭 <a href="index.html">omnilimb-face</a> · Demo</div>
    <a href="https://github.com/seanyang1983/omnilimb-face" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
  <div class="stage">
    <canvas id="avatar" width="480" height="480" aria-label="avatar"></canvas>
    <div id="subtitle"></div>
    <div id="emo"></div>
  </div>
  <form class="controls" id="say-form" autocomplete="off">
    <input id="say-input" type="text" placeholder="Type something and press Enter — 输入文字回车,形象会对口型说出来" />
    <button type="submit">Say</button>
  </form>
  <p class="hint">Standalone front-end demo — synthetic lip-sync (no real TTS/agent). Avatar: Live2D Cubism sample "Mao" © Live2D Inc., loaded from CDN. The full plugin speaks your hermes agent's real replies.</p>

  <!-- Live2D runtimes (CDN, not bundled) -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
  <script src="avatar.js"></script>
  <script>
  (function(){
    var canvas = document.getElementById('avatar');
    var sub = document.getElementById('subtitle');
    var emo = document.getElementById('emo');
    var hasLive2D = !!(window.PIXI && (window.PIXI.live2d || window.Live2DCubismCore));
    var avatar = hasLive2D ? new Live2DAvatar(canvas) : new CanvasAvatar(canvas);
    var emotions = { neutral:0, joy:1, smirk:2, surprise:3, anger:4, sadness:5, fear:6, disgust:7 };
    var emoNames = Object.keys(emotions);

    // Load the reference model from the shipped model dictionary.
    fetch('models/model_dict.json').then(function(r){ return r.json(); }).then(function(list){
      var m = (list && list[0]) || {};
      if (m.url && avatar.setModel) { avatar.setModel(m.url); }
    }).catch(function(){ /* canvas placeholder still animates */ });

    var speaking = false;
    function speak(text){
      if (!text) return;
      sub.textContent = text;
      // pick an expression by a simple keyword/random heuristic
      var idx = Math.floor(Math.random()*emoNames.length);
      var name = emoNames[idx];
      emo.textContent = '· ' + name + ' ·';
      try { avatar.setExpression(emotions[name], name); } catch(e){}
      // synthetic lip-sync: animate mouth for a duration based on text length
      var dur = Math.min(6000, 500 + text.length * 110);
      var t0 = performance.now();
      speaking = true;
      (function frame(now){
        var el = now - t0;
        if (el >= dur) { try{ avatar.resetMouth(); }catch(e){} speaking=false; return; }
        // envelope: random openness with a gentle bias, closes between "syllables"
        var base = 0.5 + 0.5*Math.sin(el/90);
        var v = Math.max(0, base * (0.55 + Math.random()*0.45));
        try { avatar.setMouthOpen(Math.min(1, v)); } catch(e){}
        requestAnimationFrame(frame);
      })(t0);
    }

    document.getElementById('say-form').addEventListener('submit', function(e){
      e.preventDefault();
      var inp = document.getElementById('say-input');
      speak(inp.value.trim());
      inp.value='';
    });

    // auto demo after the model has a moment to load
    var lines = [
      "Hi! I'm omnilimb-face — a face & voice for your hermes agent.",
      "你好!我是 omnilimb-face,给你的 hermes 智能体一张会说话的脸。",
      "I support both Live2D and Live3D (VRM) avatars."
    ];
    var li = 0;
    setTimeout(function tick(){
      if (!speaking) { speak(lines[li % lines.length]); li++; }
      setTimeout(tick, 5200);
    }, 2500);
  })();
  </script>
</body>
</html>
